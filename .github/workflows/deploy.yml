name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build site
        env:
          # Public Wix Headless OAuth Client ID — safe to hardcode (browser-visible, no secret)
          # Wix site: https://revanthkumarha.wixsite.com/my-site-4
          PUBLIC_WIX_CLIENT_ID: 78f72bb8-e7ac-4945-acc2-b2c119855015
          SITE_URL: https://harshithsunku.github.io
          BASE_PATH: /freshmangoes-web
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
